<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>محول العملات</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-900">

  <header class="bg-white p-4 shadow text-center">
    <h1 class="text-xl font-bold">💱 محول العملات</h1>
  </header>

  <main class="max-w-md mx-auto p-4 space-y-4">

    <input id="amount" type="number"
      class="w-full p-2 border rounded"
      placeholder="أدخل المبلغ">

    <div class="grid grid-cols-2 gap-2">
      <select id="fromCurrency" class="p-2 border rounded"></select>
      <select id="toCurrency" class="p-2 border rounded"></select>
    </div>

    <button id="convertBtn"
      class="w-full bg-blue-600 text-white p-3 rounded">
      تحويل
    </button>

    <div id="result" class="text-lg font-bold mt-3"></div>

  </main>
<script src="app.js"></script>
</body>
</html>
